name: CI

"on":
  pull_request:
    branches:
      - staging
      - master
  push:
    branches:
      - staging
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate Clerk CI secrets
        run: |
          test -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" || (echo "Missing NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY repository secret" && exit 1)
          test -n "$CLERK_SECRET_KEY" || (echo "Missing CLERK_SECRET_KEY repository secret" && exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Next.js route types
        run: pnpm exec next typegen

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and component tests
        run: pnpm test:run

      - name: Production build
        run: pnpm build

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_TESTING_TOKEN: ${{ secrets.CLERK_TESTING_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate Clerk CI secrets
        run: |
          test -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" || (echo "Missing NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY repository secret" && exit 1)
          test -n "$CLERK_SECRET_KEY" || (echo "Missing CLERK_SECRET_KEY repository secret" && exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID repository secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID repository secret" && exit 1)
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN repository secret" && exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview artifacts
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        run: |
          vercel deploy --prebuilt --token="$VERCEL_TOKEN" > deployment-url.txt
          cat deployment-url.txt

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID repository secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID repository secret" && exit 1)
          test -n "$VERCEL_TOKEN" || (echo "Missing VERCEL_TOKEN repository secret" && exit 1)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production
        run: |
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" > deployment-url.txt
          cat deployment-url.txt
